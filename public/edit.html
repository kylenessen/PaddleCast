<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PaddleCast — config editor</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { display: block; padding: 24px 32px 120px; max-width: 900px; margin: 0 auto; }
    .edit-map { height: 380px; border-radius: 10px; margin: 8px 0 20px; border: 1px solid var(--border); }
    .loc-card { border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; margin: 14px 0; }
    .loc-card-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .loc-card-head h3 { margin: 0; flex: 1; font-size: 17px; }
    .loc-coords { color: var(--muted); font-size: 13px; margin: 2px 0 10px; }
    .btn-small { padding: 3px 12px; font-size: 13px; }
    details.loc-prefs { margin-top: 6px; }
    details.loc-prefs > summary { cursor: pointer; color: var(--accent); font-size: 14px; padding: 4px 0; }
    .save-bar {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 500;
      display: flex; align-items: center; gap: 14px;
      padding: 12px 32px; background: var(--card, #fff);
      border-top: 1px solid var(--border);
    }
    .save-status { font-size: 14px; }
    .save-status.ok { color: var(--accent); }
    .save-status.err { color: var(--danger, #c0392b); }
    .defaults-toggle > summary { cursor: pointer; font-size: 18px; font-weight: 600; padding: 6px 0; }
    .color-scheme-title { margin: 12px 0 0; font-size: 14px; }
    .field input[type="color"] {
      width: 100%; height: 38px; padding: 2px;
      border: 1px solid var(--line); border-radius: 8px; background: #fff;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1 class="page-title">Config editor</h1>
  <p class="hint" id="intro">
    Edits the locations and default filters everyone sees. Drag a point on
    the map to move a launch, click the map to add one, and use the same
    controls as the app for each spot. Saving overwrites
    <code>public/config.json</code> in your working tree. Commit and push
    to deploy.
  </p>
  <div id="editor">
    <p class="loading">Loading config.json…</p>
  </div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module" src="js/edit.js"></script>
</body>
</html>
